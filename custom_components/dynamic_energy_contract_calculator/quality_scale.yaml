rules:
  # Bronze
  action-setup:
    status: done
    comment: |
      Services are registered in async_setup_entry and removed in async_unload_entry
      when no entries remain.
  appropriate-polling:
    status: exempt
    comment: |
      This integration does not poll for data. All updates are event-driven via
      state change listeners.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data:
    status: done
    comment: |
      Per-entry runtime data is stored in entry.runtime_data (RuntimeData dataclass)
      containing entities dict, netting_tracker and solar_bonus_tracker.
  test-before-configure: done
  test-before-setup:
    status: exempt
    comment: |
      No external connection to verify.
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: |
      No custom actions that raise exceptions in user-visible ways.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates:
    status: done
    comment: |
      PARALLEL_UPDATES = 0 is set in sensor.py to allow unlimited async updates.
  reauthentication-flow:
    status: exempt
    comment: |
      No authentication needed.
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: |
      No discovery mechanism.
  discovery:
    status: exempt
    comment: |
      No discovery mechanism.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: |
      Static set of devices per config entry.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices:
    status: exempt
    comment: |
      No dynamic device removal needed.

  # Platinum
  async-dependency:
    status: exempt
    comment: |
      No runtime dependencies (requirements: [] in manifest). The astral library
      used for sunrise/sunset is a pure calculation library with no async needs.
  inject-websession:
    status: exempt
    comment: |
      No HTTP requests are made by this integration.
  strict-typing: done
